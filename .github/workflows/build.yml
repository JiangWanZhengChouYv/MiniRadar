name: Build Minecraft Radar Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'
        cache: 'gradle'
      
    - name: Verify Java version
      run: |
        echo "Java version:" 
        java -version
        echo "JAVA_HOME:" $JAVA_HOME
        echo "PATH:" $PATH
      
    - name: Set Java 25 environment variables
      run: |
        echo "JAVA_HOME=/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/25.0.2-10/x64" >> $GITHUB_ENV
        echo "/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/25.0.2-10/x64/bin" >> $GITHUB_PATH
      
    - name: Build with Gradle
      run: |
        echo "::group::Building mod with Gradle"
        gradle build --info
        echo "::endgroup::"
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: miniradar-mod
        path: build/libs/*.jar