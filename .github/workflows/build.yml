name: Build MiniRadar-26.1
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整拉取代码，避免文件缺失

      # 安装Java 25（26.1强制要求，必须用这个版本）
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: gradle

      # 修复Gradle包装器缺失问题
      - name: Fix Gradle Wrapper
        run: |
          chmod +x gradlew
          gradle wrapper --gradle-version 9.4.1

      # 清理旧缓存+构建（26.1专用，无多余参数）
      - name: Build Mod
        run: |
          ./gradlew clean build --no-daemon -Dfile.encoding=UTF-8

      # 上传成品模组（只保留正式jar，排除dev/sources）
      - name: Upload Mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: MiniRadar-26.1
          path: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            !build/libs/*-sources.jar