name: Build Minecraft Radar Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'adopt'
        java-version: '25'
        cache: 'gradle'
      
    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew
      
    - name: Build with Gradle
      run: |
        echo "::group::Building mod with Gradle"
        ./gradlew build --info
        echo "::endgroup::"
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: miniradar-mod
        path: build/libs/*.jar
        
    - name: Build singleplayer version
      run: |
        echo "::group::Building singleplayer version"
        ./gradlew build --info
        echo "::endgroup::"
      
    - name: Build multiplayer version
      run: |
        echo "::group::Building multiplayer version"
        ./gradlew build --info
        echo "::endgroup::"