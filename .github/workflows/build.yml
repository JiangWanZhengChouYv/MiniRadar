name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ 正确：JDK 25 (MC26.1 强制要求)
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'
          cache: gradle

      # ✅ 修复：强制使用 Gradle 9.1.0 (官方要求)
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 9.1.0

      # ✅ 修复：生成正确的 Gradle Wrapper 9.1.0
      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=9.1.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ✅ 构建命令
      - name: Build
        run: ./gradlew build --no-daemon

      # ✅ 精简：合并冗余上传，只保留一个
      - name: Upload Mod Jar
        uses: actions/upload-artifact@v4
        with:
          name: miniradar
          path: build/libs/*.jar