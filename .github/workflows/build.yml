# GitHub Actions配置：构建MiniRadar 26.1模组
name: Build MiniRadar-26.1

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整拉取代码，避免文件缺失

      # 安装Java 21（Minecraft 26.1强制要求）
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      # 安装Gradle 8.11.1
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.11.1

      # 清理旧缓存并构建（26.1专用，无多余参数）
      - name: Build Mod
        run: |
          gradle clean build --no-daemon -Dfile.encoding=UTF-8

      # 上传成品模组（仅保留正式JAR，排除-dev/-sources包）
      - name: Upload Mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: MiniRadar-26.1
          path: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            !build/libs/*-sources.jar
            !build/libs/*-javadoc.jar