name: Build MiniRadar-26.1

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.11.1

      - name: Build Mod
        run: |
          gradle clean build --no-daemon -Dfile.encoding=UTF-8
        env:
          ORG_GRADLE_PROJECT_java_version=21

      - name: Upload Mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: MiniRadar-26.1
          path: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            !build/libs/*-sources.jar