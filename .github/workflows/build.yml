name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ 唯一核心修复：Java 21 → 25（NeoForge 26.1 强制要求）
      # ✅ 微软发行版无 Java25，替换为官方标准 Temurin
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.11.1

      # ✅ 完全保留：手动生成 Gradle Wrapper（你要求必须保留）
      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.11.1

      # ✅ 增加 --no-daemon 防止缓存冲突，不影响功能
      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: miniradar
          path: build/libs/*.jar