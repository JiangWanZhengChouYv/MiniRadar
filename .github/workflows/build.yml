name: Build 26.1 Mod

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}

      # 26.1 必须 Java 25！
      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: gradle

      # 26.1 干净构建
      - name: Build with Gradle
        run: |
          gradle clean build --no-daemon -Dfile.encoding=UTF-8

      - name: Upload 26.1 Mod
        uses: actions/upload-artifact@v4
        with:
          name: MiniRadar-26.1
          path: build/libs/*.jar