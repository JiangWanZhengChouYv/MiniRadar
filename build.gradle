plugins {
    id 'java-library'
    id 'net.neoforged.moddev' version '2.0.140'
}

group = "com.miniradar"
version = "1.0.0"

// 使用 toolchain 代替 sourceCompatibility，适配 JDK 25
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

// 仓库（确保能下载 NeoForge 及第三方库）
repositories {
    mavenCentral()
    maven {
        name = "NeoForge"
        url = "https://maven.neoforged.net/releases"
    }
}

// NeoForge 配置
neoForge {
    // 使用你截图中出现的 26.1.2.10-beta
    version = "26.1.2.10-beta"

    // 可选：配置运行目录（开发时点击运行客户端/服务端）
    // runs {
    //     client {
    //         workingDirectory = project.file("run/client")
    //     }
    //     server {
    //         workingDirectory = project.file("run/server")
    //     }
    // }
}

// 依赖
dependencies {
    // 即使插件会自动添加，显式声明可以避免某些解析问题
    implementation "net.neoforged:neoforge:26.1.2.10-beta"
}

// 处理 mods.toml 版本替换
processResources {
    inputs.property "version", project.version
    filesMatching("META-INF/mods.toml") {
        expand "version": project.version
    }
}