plugins {
    id 'fabric-loom' version '1.5.+'
    id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

repositories {
    mavenCentral()
    maven {
        name = "Fabric"
        url = "https://maven.fabricmc.net/"
    }
}

dependencies {
    minecraft 'com.mojang:minecraft:26.1'
    mappings 'net.fabricmc:yarn:26.1.1+build.12'
    modImplementation 'net.fabricmc:fabric-loader:0.15.0+26.1'
    modImplementation 'net.fabricmc.fabric-api:fabric-api:0.100+26.1'
}

loom {
    runs {
        client {
            configName = "Fabric Client"
        }
        server {
            configName = "Fabric Server"
        }
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
    repositories {
        mavenLocal()
    }
}