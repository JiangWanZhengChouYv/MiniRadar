plugins {
    // 26.1专用Loom插件，支持新版本号
    id 'fabric-loom' version '1.10.34'
    id 'java-library'
    id 'maven-publish'
}

// 基础项目配置
group = 'com.miniradar'
version = '1.0.0'
description = 'MiniRadar 26.1 版模组'

// Java 编译配置（严格匹配Java 25）
sourceCompatibility = JavaVersion.VERSION_25
targetCompatibility = JavaVersion.VERSION_25
compileJava {
    options.encoding = 'UTF-8'
    options.compilerArgs += ['-Xlint:-options']
}
compileTestJava {
    options.encoding = 'UTF-8'
}

// Fabric 模组配置（26.1专用，启用官方mojmap）
loom {
    officialMojangMappings() // 替代Yarn，26.1核心配置
    runs {
        client {
            environment 'development'
        }
        server {
            environment 'development'
        }
    }
}

// 依赖配置（26.1专用，无Yarn依赖）
dependencies {
    // Minecraft 核心依赖
    minecraft "com.mojang:minecraft:26.1"
    // 官方映射（26.1必用）
    mappings loom.officialMojangMappings()
    // Fabric 加载器
    modImplementation "net.fabricmc:fabric-loader:0.17.16"
    // Fabric API（匹配26.1版本）
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.101.0+26.1"
}

// 打包配置（26.1专用，简化输出）
jar {
    archiveBaseName = 'miniradar'
    archiveVersion = project.version
    from('src/main/resources') {
        include 'fabric.mod.json'
    }
}

// 发布配置（可选，用于上传Maven）
publishing {
    repositories {
        maven {
            url = "${project.findProperty('mavenRepoUrl') ?: 'build/repo'}"
        }
        publications {
            mavenJava(MavenPublication) {
                from components.java
            }
        }
    }
}