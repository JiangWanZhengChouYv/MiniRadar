plugins {
    id 'net.neoforged.gradle.userdev' version '7.0.100' apply false
}

apply plugin: 'net.neoforged.gradle.userdev'
apply plugin: 'java-library'
apply plugin: 'maven-publish'

// 基础项目配置
group = 'com.miniradar'
version = '1.0.0'
description = 'MiniRadar 26.1.2 版模组'

// Java 编译配置
sourceCompatibility = JavaVersion.VERSION_21
targetCompatibility = JavaVersion.VERSION_21
compileJava {
    options.encoding = 'UTF-8'
}

// NeoForge 配置
neoForge {
    version = '26.1.2'
}

// 依赖配置
dependencies {
    minecraft 'com.mojang:minecraft:26.1.2'
    neoForge 'net.neoforged:neoforge:26.1.2'
}

// 打包配置
jar {
    archiveBaseName = 'miniradar'
    archiveVersion = project.version
}

// 发布配置
publishing {
    repositories {
        maven {
            url = "${project.findProperty('mavenRepoUrl') ?: 'build/repo'}"
        }
    }
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}