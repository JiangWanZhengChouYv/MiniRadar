# ... 文件头部的 modLoader, license 等保持不变 ...

# 关键：必须声明版本兼容范围
neoforge_version_range = "${neo_version_range}"
minecraft_version_range = "${minecraft_version_range}"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
authors = "You"
description = "Mini Radar Mod for Minecraft 26.1"

# ========== 必须添加的部分 ==========
[[dependencies.${mod_id}]]
    modId = "neoforge"
    type = "required"
    versionRange = "${neo_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"
# =================================